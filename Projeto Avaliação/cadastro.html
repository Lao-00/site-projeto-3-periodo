<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="cadastro-body">
    <div class="cadastro-container">
        <img src="imgs/Logo.jpeg" alt="Imagem com fundo branco com os dizeres B5 de forma estilizada e Base 5 em azul e automações em preto" class="logo-login-cadastro">
        <div class="cadastro-card">
            <form id="form-cadastro" action="home_page.html" method="get"> <!-- Usando get em vez de post para simular o acesso após cadastro, com post dá erro porque não temos backend-->
                <h1>Crie sua conta</h1>

                <div class="campo">
                    <label for="nome">Nome</label>
                    <input type="text" name="nome" id="nome" placeholder="Digite seu nome" tabindex="1" required>
                </div>

                <div class="campo">
                    <label for="email">E-Mail</label>
                    <input type="email" name="email" id="email" placeholder="Digite seu e-mail" tabindex="2" required>
                </div>

                <div class="campo">
                    <label for="confirmar_email">Confirme seu E-Mail</label>
                    <input type="email" name="confirmar_email" id="confirmar_email" placeholder="Confirme seu e-mail" tabindex="3" required>
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" name="senha" id="senha" placeholder="Digite sua senha" tabindex="4" required>
                </div>

                <div class="campo">
                    <label for="confirmar_senha">Confirme sua senha</label>
                    <input type="password" name="confirmar_senha" id="confirmar_senha" placeholder="Confirme sua senha" tabindex="5" required>
                </div>

                <div class="cadastro-botao">
                    <button type="submit" tabindex="6">Criar</button>
                    <button type="reset" tabindex="7">Apagar</button>
                </div>
            </form>
            <p>
                Já tem conta? <a href="login.html" tabindex="8">Login</a>
            </p>
        </div>
    </div>

    <script>
    const form = document.getElementById('form-cadastro');
    const campos = form.querySelectorAll('input'); // pega os inputs do formulário

    // valida os campos ao submeter
    form.addEventListener('submit', function (e) {
        let valid = true;

        campos.forEach(campo => {
            const erroSpan = document.getElementById(`${campo.id}-erro`); // pega o span de erro do campo
            let mensagem = "";

            // validação de campos vazios ou formato incorreto
            if (!campo.checkValidity()) {
                mensagem = "Este campo é obrigatório ou o formato está incorreto.";
                valid = false;
            }

            // validação específica: confirmação de e-mail
            if (campo.id === 'confirmar_email' && campo.value !== document.getElementById('email').value) {
                mensagem = "Os e-mails não coincidem.";
                valid = false;
            }

            // validação específica: confirmação de senha
            if (campo.id === 'confirmar_senha' && campo.value !== document.getElementById('senha').value) {
                mensagem = "As senhas não coincidem.";
                valid = false;
            }

            if (mensagem) {
                erroSpan.textContent = mensagem;
                campo.setAttribute('aria-invalid', 'true');
                e.preventDefault(); // cancela o envio se houver erro
            } else {
                erroSpan.textContent = "";
                campo.setAttribute('aria-invalid', 'false');
            }
        });
    });

    // percorre cada campo
    campos.forEach(function (campo, index) {
        campo.addEventListener('keydown', function (e) { // verifica se uma tecla é pressionada no campo
            if (e.key === 'Enter') {
                e.preventDefault(); // cancela o comportamento padrão (enviar formulário)
                const proximo = campos[index + 1]; // pega próximo input
                if (proximo) {
                    proximo.focus(); // move foco pra ele
                } else {
                    form.requestSubmit(); // quando está no último, dispara o submit com validação
                }
            }
        });
    });
</script>

</body>

</html>
