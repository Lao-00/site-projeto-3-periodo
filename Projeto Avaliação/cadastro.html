<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="cadastro-body">
    <div class="cadastro-container">
        <img src="imgs/Logo.jpeg" alt="Imagem com fundo branco com os dizeres B5 de forma estilizada e Base 5 em azul e automações em preto" class="logo-login-cadastro">
        <div class="cadastro-card">
            <form action="home_page.html" method="get"> <!-- Usando get em vez de post para simular o acesso após cadastro, com post dá erro porque não temos backend-->
                <h1>Crie sua conta</h1>

                <div class="campo">
                    <label for="nome">Nome</label>
                    <input type="text" name="nome" id="nome" placeholder="Digite seu nome" required>
                </div>

                <div class="campo">
                    <label for="email">E-Mail</label>
                    <input type="email" name="email" id="email" placeholder="Digite seu e-mail" required>
                </div>

                <div class="campo">
                    <label for="confirmar_email">Confirme seu E-Mail</label>
                    <input type="email" name="confirmar_email" id="confirmar_email" placeholder="Confirme seu e-mail" required>
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" name="senha" id="senha" placeholder="Digite sua senha" required>
                </div>

                <div class="campo">
                    <label for="confirmar_senha">Confirme sua senha</label>
                    <input type="password" name="confirmar_senha" id="confirmar_senha" placeholder="Confirme sua senha" required>
                </div>

                <div class="cadastro-botao">
                    <button type="submit">Criar</button>
                    <button type="reset">Apagar</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
