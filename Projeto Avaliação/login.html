<!DOCTYPE html>
<html lang="pt-br"> 

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="login-body">
    <div class="login-container">
        <img src="imgs/Logo.jpeg" alt="Imagem com fundo branco com os dizeres B5 de forma estilizada e Base 5 em azul e automações em preto" class="logo-login-cadastro">
        <div class="login-card">
            <form id="form-login" action="home_page.html" method="get"> <!-- Usando get em vez de post para simular o acesso após cadastro, com post dá erro porque não temos backend-->
                <h1>Login</h1>

                <div class="campo">
                    <label for="email">E-Mail</label>
                    <input type="email" name="email" id="email" placeholder="Digite seu e-mail" tabindex="1" required>
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" name="senha" id="senha" placeholder="Digite sua senha" tabindex="2" required>
                </div>

                <div class="login-botao">
                    <button type="submit" tabindex="3">Entrar</button>
                </div>

            </form>

            <p>
                Não tem conta? <a href="cadastro.html" tabindex="4">Cadastre-se</a>
            </p>
        </div>
    </div>

    <script>
    const form = document.getElementById('form-login');
    const campos = form.querySelectorAll('input'); // pega os inputs do formulário

    // valida os campos ao submeter
    form.addEventListener('submit', function(e) {
        let valid = true;

        campos.forEach(campo => {
            const erroSpan = document.getElementById(`${campo.id}-erro`); // pega o span de erro do campo
            if (!campo.checkValidity()) {
                valid = false;
                e.preventDefault(); // cancela o envio se houver erro
                erroSpan.textContent = campo.type === 'email'
                    ? "Por favor, insira um e-mail válido."
                    : "Este campo é obrigatório.";
                campo.setAttribute('aria-invalid', 'true');
            } else {
                erroSpan.textContent = "";
                campo.setAttribute('aria-invalid', 'false');
            }
        });
    });

    // percorre cada campo
    campos.forEach(function (campo, index) {
        campo.addEventListener('keydown', function (e) { // verifica se uma tecla é pressionada no campo
            if (e.key === 'Enter') {
                e.preventDefault(); // cancela o comportamento padrão (enviar formulário)
                const proximo = campos[index + 1]; // pega próximo input
                if (proximo) {
                    proximo.focus(); // move foco pra ele
                } else {
                    form.requestSubmit(); // quando está no último, dispara o submit com validação
                }
            }
        });
    });
</script>

</body>

</html>
